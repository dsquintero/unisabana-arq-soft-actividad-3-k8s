# ====================================================================
# application-qa.yaml — ArgoCD Application para el entorno QA.
#
# Igual que la app dev, pero apunta al namespace qa y usa values-qa.yaml
# (3 réplicas, HPA activo, ingress habilitado). Los values-kind.yaml sobreescriben
# la imagen para que use la versión local cargada en el clúster kind durante la
# demo local. Cuando el pipeline CI/CD publique en GHCR, se elimina values-kind.
# ====================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ms-qa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: qa
  source:
    repoURL: https://github.com/dsquintero/unisabana-arq-soft-actividad-3-k8s
    targetRevision: main
    path: helm/microservicio
    helm:
      valueFiles:
        - values-qa.yaml
        - values-kind.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true